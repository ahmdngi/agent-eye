<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Eye</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --orange: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 400px;
      max-height: 600px;
      overflow-y: auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent);
      color: #fff;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .status-dot.loading { background: var(--orange); animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .content { padding: 12px 16px; }
    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .field-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }
    .field-value {
      font-size: 13px;
      word-break: break-all;
      line-height: 1.4;
    }
    .field-value.url { color: var(--accent-hover); font-size: 12px; }
    .field-value.code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--border);
      color: var(--text-muted);
    }
    .tag.og { background: #312e81; color: #a5b4fc; }
    .tag.meta { background: #1e3a5f; color: #93c5fd; }
    .headings-list {
      list-style: none;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
    }
    .headings-list li {
      padding: 2px 0;
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .h-tag {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 28px;
    }
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #475569; }
    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #166534;
      color: #bbf7d0;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.err { background: #7f1d1d; color: #fecaca; }
    .error-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .error-msg p { margin-bottom: 8px; }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    /* History view */
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .history-item .info {
      flex: 1;
      min-width: 0;
    }
    .history-item .info .title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .history-item .info .url {
      font-size: 11px;
      color: var(--accent-hover);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .history-item .info .ts {
      font-size: 10px;
      color: var(--text-muted);
    }
    .history-item .info .ts .tag {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 99px;
      background: var(--border);
      color: var(--text-muted);
      margin-left: 4px;
    }
    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: #7f1d1d; color: #fecaca; }
    .btn-icon.loading { pointer-events: none; opacity: 0.5; }
    .btn-back {
      background: var(--border);
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-back:hover { background: #475569; }
    .history-count {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #historyView { display: none; }
    #currentView { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="logo">
    <h1>Agent Eye</h1>
    <span class="badge">v1.1</span>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Analyzing page...</span>
  </div>

  <div id="currentView">
    <div class="content" id="content">
      <div class="error-msg" id="loadingMsg">
        <p>Loading page data...</p>
      </div>
    </div>
  </div>

  <div id="historyView">
    <div class="header" style="border-bottom: 1px solid var(--border); justify-content: space-between;">
      <button class="btn-back" id="backBtn">← Back</button>
      <span style="font-size:13px;font-weight:600;">Captured Pages</span>
      <span></span>
    </div>
    <div class="content" id="historyContent">
      <div class="error-msg" id="historyLoading">
        <p>Loading history...</p>
      </div>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="btn btn-primary" id="shareBtn">📤 Share</button>
    <button class="btn btn-secondary" id="historyBtn">📋 History</button>
    <button class="btn btn-secondary" id="copyBtn">📋 Copy URL</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
